<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- CRITICAL CSS - Inlined for fastest render -->
    <style>
      /* Base Reset */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      
      html { 
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }
      
      body { 
        font-family: 'Urbanist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
        background: #ffffff;
      }
      
      #root { 
        min-height: 100vh;
      }
      
      /* Initial Loader */
      .app-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #ffffff;
        gap: 16px;
      }
      
      .app-loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top-color: #7C3AED;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      .app-loader-text {
        color: #6b7280;
        font-size: 14px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Prevent layout shift for common elements */
      img, video { 
        max-width: 100%; 
        height: auto;
        display: block;
      }
      
      /* Navbar placeholder height */
      .navbar-height { height: 80px; }
      
      /* Hide content until styles load */
      .js-loading * {
        animation-duration: 0s !important;
        transition-duration: 0s !important;
      }
      
      /* Common Tailwind utilities for above-fold content */
      .flex { display: flex; }
      .hidden { display: none; }
      .block { display: block; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .justify-between { justify-content: space-between; }
      .min-h-screen { min-height: 100vh; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .relative { position: relative; }
      .absolute { position: absolute; }
      .text-center { text-align: center; }
      .font-bold { font-weight: 700; }
      .text-white { color: #ffffff; }
      .bg-white { background-color: #ffffff; }
      .rounded-lg { border-radius: 0.5rem; }
      .overflow-hidden { overflow: hidden; }
      
      /* Skeleton animation */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      
      /* Purple color used in brand */
      .text-purple-600 { color: #7C3AED; }
      .bg-purple-600 { background-color: #7C3AED; }
    </style>
    
    <title>Newlista - Commercial Real Estate</title>
    <meta name="description" content="Find commercial real estate properties for sale and lease on Newlista" />
  </head>
  <body class="js-loading">
    <div id="root">
      <!-- Initial loader shown before React hydrates -->
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <span class="app-loader-text">Loading Newlista...</span>
      </div>
    </div>
    
    <!-- Main React App -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Remove js-loading class after page loads -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.remove('js-loading');
      });
    </script>
    
    <!-- Async load Google Fonts -->
    <script>
      (function() {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap';
        link.media = 'print';
        link.onload = function() { this.media = 'all'; };
        document.head.appendChild(link);
      })();
    </script>
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap" />
    </noscript>
  </body>
</html>
