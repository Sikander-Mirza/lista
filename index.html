<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://admin.newlista.com" />
    
    <!-- Meta tags for SEO -->
    
    <meta name="theme-color" content="#7C3AED" />
    
    <title></title>

    <!-- Critical CSS -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:'Urbanist',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .initial-loader{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f9fafb}
      .initial-loader-spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#7C3AED;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    
    <!-- Load fonts async -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    </noscript>

     <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://www.newlista.com/#organization",

        "url": "https://www.newlista.com/",
        "logo": "https://www.newlista.com/assets/NewlistaLogo-BV7NO06Q.png",
        "description": "Newlista Ventures LLC is an online commercial real estate investor network connecting investors, sponsors, and opportunities across the United States.",
        "telephone": "+1-713-659-9670",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "5900 Balcones Drive, #23371",
          "addressLocality": "Austin",
          "addressRegion": "TX",
          "postalCode": "78731",
          "addressCountry": "US"
        },
        "sameAs": [
          "https://www.facebook.com/Newlista",
          "https://x.com/newlista",
          "https://www.linkedin.com/in/newlista"
        ]
      }
    </script>
    
  </head>

    <div id="root">
      <div class="initial-loader">

      </div>
    </div>
