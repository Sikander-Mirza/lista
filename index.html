<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to external domains (improves TTFB) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" />
    
    <!-- DNS Prefetch for API and image CDN -->
    <link rel="dns-prefetch" href="https://your-api-domain.com" />
    <link rel="dns-prefetch" href="https://your-image-cdn.com" />
    
    <!-- Preload critical fonts (only the weights you actually use) -->
    <link 
      rel="preload" 
      href="https://fonts.gstatic.com/s/urbanist/v15/L0x4DF3oX-vMPP7SVdQ.woff2" 
      as="font" 
      type="font/woff2" 
      crossorigin 
    />
    
    <!-- Load fonts with display=swap (already in your URL, but let's optimize) -->
    <link 
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap"
    />
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap" 
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for browsers without JS -->
    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&display=swap" 
        rel="stylesheet"
      />
    </noscript>

    <!-- Meta tags for SEO -->
    <meta name="description" content="Newlista - Find commercial real estate properties for sale and lease" />
    <meta name="theme-color" content="#7C3AED" />
    
    <title>Newlista - Commercial Real Estate</title>

    <!-- Critical CSS (inline above-the-fold styles) -->
    <style>
      /* Critical CSS - Prevents FOUC and improves FCP */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        font-family: 'Urbanist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading skeleton animation */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      /* Initial loading state */
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f9fafb;
      }
      
      .initial-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #7C3AED;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Initial loader (shown before React loads) -->
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader-spinner"></div>
      </div>
    </div>
    
    <!-- Main app script -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Google Sign-In - Load after page load -->
    <script>
      window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.async = true;
        script.defer = true;
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
